{% extends 'base.html' %}

{% block content %}

<h1>Edit Blog</h1>

<form method="POST">

    <input
        type="text"
        name="title"
        value="{{ post.title }}">

    <textarea
        name="content">{{ post.content }}</textarea>

    <button type="submit">
        Update Post
    </button>

</form>

{% endblock %}
